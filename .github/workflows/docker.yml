name: Docker

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: docker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: eddgrant/freeagent-mcp
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            type=ref,event=pr,prefix=pr-
            type=raw,value=pr-${{ github.event.pull_request.number }}-${{ github.sha }},enable=${{ github.event_name == 'pull_request' }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const tags = `${{ steps.meta.outputs.tags }}`.split('\n').filter(Boolean);
            const digest = '${{ steps.build.outputs.digest }}';
            const body = [
              '### Docker image pushed',
              '',
              '| Detail | Value |',
              '|--------|-------|',
              ...tags.map(tag => `| Tag | \`${tag}\` |`),
              `| Digest | \`${digest}\` |`,
              '',
              'Pull with:',
              '```',
              `docker pull ${tags[0]}`,
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
